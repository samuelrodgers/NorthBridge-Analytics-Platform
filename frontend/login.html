<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Northbridge Analytics</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      visibility: visible; /* login page never hides */
      margin: 0;
      min-height: 100vh;
      display: flex;
      background: var(--bg-base);
    }

    /* ── Left panel ── */
    .login-panel-left {
      flex: 1;
      display: none;
      background: url('assets/images/Analytics_Logo.jpeg') center/cover no-repeat;
      position: relative;
    }
    .login-panel-left::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(10,17,28,0.35) 0%, rgba(10,17,28,0.1) 100%);
    }
    @media (min-width: 768px) {
      .login-panel-left { display: block; }
    }

    /* ── Right panel ── */
    .login-panel-right {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      box-sizing: border-box;
    }
    @media (min-width: 768px) {
      .login-panel-right { width: 420px; flex-shrink: 0; }
    }

    .login-card {
      width: 100%;
      max-width: 360px;
    }

    /* ── Branding ── */
    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .login-brand-logo {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 12px;
    }
    .login-brand-name {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .login-brand-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: -8px;
    }

    /* ── Form ── */
    .login-form { display: flex; flex-direction: column; gap: 12px; }

    .login-field { display: flex; flex-direction: column; gap: 5px; }
    .login-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .login-input {
      background: var(--surface-1);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
      width: 100%;
    }
    .login-input:focus { border-color: var(--accent-border); }
    .login-input::placeholder { color: var(--text-tertiary); }

    .login-btn {
      margin-top: 4px;
      padding: 11px 0;
      border-radius: var(--radius-md);
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.88; }
    .login-btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .login-btn-secondary {
      background: var(--surface-2);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
      margin-top: 0;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }
    .login-divider-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .login-error {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-md);
      padding: 9px 12px;
      font-size: 12px;
      color: #f87171;
    }

    .login-footer {
      margin-top: 28px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="login-panel-left"></div>

  <div class="login-panel-right">
    <div class="login-card">

      <div class="login-brand">
        <img class="login-brand-logo" src="assets/images/Analytics_Logo.jpeg" alt="Northbridge">
        <div>
          <div class="login-brand-name">Northbridge Financial</div>
          <div class="login-brand-sub">Analytics Console</div>
        </div>
      </div>

      <form class="login-form" id="login-form" autocomplete="on">
        <div class="login-field">
          <label class="login-label" for="input-email">Email</label>
          <input class="login-input" type="email" id="input-email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="login-field">
          <label class="login-label" for="input-password">Password</label>
          <input class="login-input" type="password" id="input-password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <div class="login-error" id="login-error"></div>

        <button type="submit" class="login-btn login-btn-primary">Sign in</button>

        <div class="login-divider"><span class="login-divider-label">or</span></div>

        <button type="button" class="login-btn login-btn-secondary" id="demo-btn">View demo — no login required</button>
      </form>

      <div class="login-footer">
        Demo environment · some features may be incomplete
      </div>

    </div>
  </div>

<script type="module">
  import { login, redirectIfAuthed } from "./auth.js";
  redirectIfAuthed();

  const form  = document.getElementById("login-form");
  const err   = document.getElementById("login-error");

  function showError(msg) {
    err.textContent = msg;
    err.style.display = "block";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    err.style.display = "none";
    const email    = document.getElementById("input-email").value;
    const password = document.getElementById("input-password").value;
    try {
      await login(email, password);
      window.location.replace("/index.html");
    } catch (e) {
      showError(e.message);
    }
  });

  document.getElementById("demo-btn").addEventListener("click", async () => {
    err.style.display = "none";
    try {
      await login("guest@guest.com", "guest");
      window.location.replace("/index.html");
    } catch {
      showError("Demo login failed — please try again.");
    }
  });
</script>
</body>
</html>
